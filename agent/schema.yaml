openapi: 3.1.0
info:
  title: Agent Search Products API
  version: 1.0.0
  description: API para busca de produtos no catálogo via Algolia.
servers:
  - url: https://SEU-DOMINIO.com.br/agent
paths:
  /search-products.php:
    post:
      operationId: searchProducts
      summary: Busca produtos no catalogo da loja
      security:
        - AgentTokenAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: string
                  description: Termo de busca do produto.
      responses:
        '200':
          description: Lista de produtos encontrados.
          content:
            application/json:
              schema:
                type: object
                properties:
                  total:
                    type: integer
                  query:
                    type: string
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        sku:
                          type: string
                        price:
                          type: string
                        url:
                          type: string
                        description:
                          type: string
components:
  securitySchemes:
    AgentTokenAuth:
      type: apiKey
      in: header
      name: X-Agent-Token
